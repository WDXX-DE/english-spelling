<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>wdx.Eenglish-spelling | 英文拼写练习</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #7c3aed;
      --primary-light: #a855f7;
      --accent: #06b6d4;
      --success: #10b981;
      --error: #ef4444;
      --warning: #f59e0b;
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.15);
      --text-primary: #f1f5f9;
      --text-secondary: rgba(241, 245, 249, 0.7);
      --card-radius: 24px;
      --transition: cubic-bezier(0.16, 1, 0.3, 1);
    }

    html, body {
      min-height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow-y: auto;
    }

    body { background: #0f0c29; position: relative; }

    #bgCanvas { position: fixed; inset: 0; z-index: 0; }

    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(80px); opacity: 0.35;
      pointer-events: none; z-index: 0;
      animation: orbFloat 12s ease-in-out infinite alternate;
    }
    .orb-1 { width:600px;height:600px;background:radial-gradient(circle,#7c3aed,transparent);top:-200px;left:-100px;animation-duration:10s; }
    .orb-2 { width:500px;height:500px;background:radial-gradient(circle,#06b6d4,transparent);bottom:-150px;right:-100px;animation-duration:14s;animation-delay:-4s; }
    .orb-3 { width:400px;height:400px;background:radial-gradient(circle,#ec4899,transparent);top:40%;left:50%;transform:translate(-50%,-50%);animation-duration:8s;animation-delay:-2s; }

    @keyframes orbFloat {
      0%   { transform: translate(0,0) scale(1); }
      50%  { transform: translate(30px,-40px) scale(1.05); }
      100% { transform: translate(-20px,20px) scale(0.95); }
    }

    /* ===== Scrollable wrapper ===== */
    .app-wrapper {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px 16px;
    }

    .card {
      width: 100%; max-width: 700px;
      background: var(--glass-bg);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: var(--card-radius);
      padding: 40px 52px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.05) inset,0 32px 64px rgba(0,0,0,0.4),0 0 100px rgba(124,58,237,0.15);
      margin: auto 0;
    }

    /* ===== Daily Check-in Banner ===== */
    .checkin-banner {
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(16,185,129,0.1));
      border: 1px solid rgba(245,158,11,0.25);
      border-radius: 14px; padding: 12px 18px;
      margin-bottom: 24px; gap: 12px;
      cursor: pointer; transition: all 0.3s ease;
      position: relative; overflow: hidden;
    }
    .checkin-banner::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(245,158,11,0.08), transparent);
      opacity: 0; transition: opacity 0.3s;
    }
    .checkin-banner:hover::before { opacity: 1; }
    .checkin-banner:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(245,158,11,0.15); }

    .checkin-left { display: flex; align-items: center; gap: 10px; }
    .checkin-fire { font-size: 22px; line-height: 1; }
    .checkin-info { display: flex; flex-direction: column; gap: 2px; }
    .checkin-title { font-size: 13px; font-weight: 700; color: #fbbf24; letter-spacing: 0.3px; }
    .checkin-sub   { font-size: 11px; color: var(--text-secondary); }

    .checkin-right { display: flex; align-items: center; gap: 8px; }

    .streak-dots { display: flex; gap: 4px; }
    .streak-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.15);
      transition: all 0.3s ease;
    }
    .streak-dot.active { background: #f59e0b; border-color: #fbbf24; box-shadow: 0 0 6px rgba(245,158,11,0.5); }
    .streak-dot.today  { background: #10b981; border-color: #34d399; box-shadow: 0 0 8px rgba(16,185,129,0.6); animation: dotPulse 1.5s ease-in-out infinite; }

    @keyframes dotPulse {
      0%,100% { box-shadow: 0 0 8px rgba(16,185,129,0.6); }
      50%      { box-shadow: 0 0 16px rgba(16,185,129,0.9); }
    }

    .checkin-btn {
      padding: 6px 14px; border-radius: 20px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      border: none; color: white; font-size: 12px; font-weight: 700;
      cursor: pointer; transition: all 0.3s ease; white-space: nowrap;
    }
    .checkin-btn:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(245,158,11,0.4); }
    .checkin-btn.done {
      background: linear-gradient(135deg, #10b981, #059669);
      cursor: default; transform: none; box-shadow: none;
    }
    .checkin-btn.done:hover { transform: none; box-shadow: none; }

    /* ===== Header ===== */
    .header { text-align: center; margin-bottom: 28px; }

    .logo-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 60px; height: 60px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 16px; margin-bottom: 12px;
      box-shadow: 0 8px 24px rgba(124,58,237,0.4);
      font-size: 26px;
      animation: iconPulse 3s ease-in-out infinite;
    }
    @keyframes iconPulse {
      0%,100% { transform: scale(1); box-shadow: 0 8px 24px rgba(124,58,237,0.4); }
      50%      { transform: scale(1.05); box-shadow: 0 12px 32px rgba(124,58,237,0.6); }
    }

    .title {
      font-size: 26px; font-weight: 700;
      background: linear-gradient(135deg, #f1f5f9, var(--primary-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      letter-spacing: -0.5px; margin-bottom: 4px;
    }
    .subtitle { color: var(--text-secondary); font-size: 13px; letter-spacing: 0.3px; }

    /* ===== Progress ===== */
    .progress-section { margin-bottom: 24px; }
    .progress-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .progress-label { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
    .progress-count { font-size: 13px; color: var(--primary-light); font-weight: 700; font-variant-numeric: tabular-nums; }
    .progress-track { height: 6px; background: rgba(255,255,255,0.1); border-radius: 100px; overflow: hidden; }
    .progress-fill  { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 100px; transition: width 0.6s var(--transition); box-shadow: 0 0 10px rgba(124,58,237,0.5); }

    /* ===== Wrong queue badge ===== */
    .wrong-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.25);
      border-radius: 20px; padding: 3px 10px;
      font-size: 11px; font-weight: 600; color: #fca5a5;
      letter-spacing: 0.4px; margin-left: 8px;
      transition: all 0.3s ease;
    }
    .wrong-badge.hidden { opacity: 0; pointer-events: none; }

    /* ===== Question Area ===== */
    .question-area {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; padding: 24px; margin-bottom: 20px;
      position: relative; overflow: hidden;
    }
    .question-area::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    }

    .question-tag-row { display: flex; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 6px; }

    .question-tag {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(124,58,237,0.2); border: 1px solid rgba(124,58,237,0.3);
      border-radius: 20px; padding: 4px 12px;
      font-size: 11px; font-weight: 600; color: var(--primary-light);
      text-transform: uppercase; letter-spacing: 0.8px;
    }

    .retry-tag {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(239,68,68,0.18); border: 1px solid rgba(239,68,68,0.3);
      border-radius: 20px; padding: 4px 12px;
      font-size: 11px; font-weight: 600; color: #fca5a5;
      letter-spacing: 0.6px; animation: fadeInScale 0.4s var(--transition);
    }
    @keyframes fadeInScale {
      from { opacity: 0; transform: scale(0.8); }
      to   { opacity: 1; transform: scale(1); }
    }

    .chinese-sentence { font-size: 22px; font-weight: 700; color: var(--text-primary); line-height: 1.5; margin-bottom: 6px; }
    .hint-text { font-size: 12px; color: var(--text-secondary); font-style: italic; }

    /* ===== Word-by-Word Input Mode ===== */
    .word-inputs-container {
      display: none; flex-wrap: wrap; gap: 10px;
      margin-bottom: 16px; padding: 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px; border: 1px solid rgba(255,255,255,0.08);
    }
    .word-input-group {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .word-underscore {
      font-size: 11px; color: var(--text-secondary);
      letter-spacing: 1px; font-family: monospace;
    }
    .word-input {
      width: 80px; text-align: center;
      background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.15);
      border-radius: 8px; padding: 10px 8px;
      font-size: 15px; font-weight: 600; color: var(--text-primary);
      letter-spacing: 0.5px; outline: none; transition: all 0.3s ease;
      caret-color: var(--primary-light); text-transform: lowercase;
    }
    .word-input::placeholder { color: rgba(255,255,255,0.15); font-weight: 400; }
    .word-input:focus { border-color: var(--primary); background: rgba(124,58,237,0.1); box-shadow: 0 0 0 3px rgba(124,58,237,0.2); }
    .word-input.correct { border-color: var(--success); background: rgba(16,185,129,0.15); box-shadow: 0 0 0 3px rgba(16,185,129,0.2); }
    .word-input.wrong   { border-color: var(--error); background: rgba(239,68,68,0.15); box-shadow: 0 0 0 3px rgba(239,68,68,0.2); animation: shake 0.5s var(--transition); }
    .word-index {
      font-size: 10px; color: rgba(255,255,255,0.3);
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    /* ===== Single Input (legacy) ===== */
    .input-wrapper { position: relative; margin-bottom: 16px; }
    .input-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }

    .spelling-input {
      width: 100%;
      background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.12);
      border-radius: 14px; padding: 16px 52px 16px 20px;
      font-size: 17px; font-weight: 500; color: var(--text-primary);
      letter-spacing: 0.5px; outline: none; transition: all 0.3s ease;
      caret-color: var(--primary-light);
    }
    .spelling-input::placeholder { color: rgba(255,255,255,0.2); font-weight: 400; }
    .spelling-input:focus { border-color: var(--primary); background: rgba(124,58,237,0.08); box-shadow: 0 0 0 4px rgba(124,58,237,0.15),0 0 20px rgba(124,58,237,0.1); }
    .spelling-input.correct { border-color: var(--success); background: rgba(16,185,129,0.08); box-shadow: 0 0 0 4px rgba(16,185,129,0.15),0 0 20px rgba(16,185,129,0.1); }
    .spelling-input.wrong   { border-color: var(--error); background: rgba(239,68,68,0.08); box-shadow: 0 0 0 4px rgba(239,68,68,0.15),0 0 20px rgba(239,68,68,0.1); animation: shake 0.5s var(--transition); }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      15% { transform: translateX(-10px); }
      30% { transform: translateX(10px); }
      45% { transform: translateX(-8px); }
      60% { transform: translateX(8px); }
      75% { transform: translateX(-4px); }
      90% { transform: translateX(4px); }
    }

    .input-icon {
      position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; transition: all 0.3s ease; opacity: 0;
    }
    .input-icon.visible { opacity: 1; }
    .input-icon.success-icon { background: rgba(16,185,129,0.2); color: #10b981; }
    .input-icon.error-icon   { background: rgba(239,68,68,0.2); color: #ef4444; }

    /* ===== Feedback ===== */
    .feedback {
      min-height: 44px; display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; border-radius: 12px;
      font-size: 14px; font-weight: 500; margin-bottom: 16px;
      opacity: 0; transform: translateY(-8px); transition: all 0.35s var(--transition);
    }
    .feedback.show { opacity: 1; transform: translateY(0); }
    .feedback.success { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.25); color: #6ee7b7; }
    .feedback.error   { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.25); color: #fca5a5; }
    .feedback-emoji { font-size: 18px; line-height: 1; }

    /* ===== Buttons ===== */
    .btn-row { display: flex; gap: 10px; margin-bottom: 0; }

    .btn-submit {
      flex: 1; padding: 15px 20px;
      background: linear-gradient(135deg, var(--primary), #6d28d9);
      border: none; border-radius: 14px;
      font-size: 15px; font-weight: 700; color: white;
      cursor: pointer; letter-spacing: 0.3px;
      transition: all 0.3s var(--transition);
      position: relative; overflow: hidden;
      box-shadow: 0 4px 16px rgba(124,58,237,0.4);
    }
    .btn-submit::before {
      content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.5s ease;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(124,58,237,0.55); }
    .btn-submit:hover::before { left: 100%; }
    .btn-submit:active { transform: translateY(0); box-shadow: 0 2px 10px rgba(124,58,237,0.3); }

    /* Eye (查看答案) button */
    .btn-eye {
      flex: 0 0 auto; width: 52px; height: 52px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.3s var(--transition);
      position: relative; overflow: hidden;
      color: var(--text-secondary);
    }
    .btn-eye svg { width: 22px; height: 22px; stroke: currentColor; transition: stroke 0.3s ease; }
    .btn-eye:hover {
      color: #fbbf24; border-color: rgba(245,158,11,0.45);
      transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,158,11,0.2);
      background: rgba(245,158,11,0.08);
    }
    .btn-eye:active { transform: translateY(0); }
    .btn-eye.revealed {
      color: #fbbf24; border-color: rgba(245,158,11,0.5);
      background: rgba(245,158,11,0.1); cursor: default;
      box-shadow: 0 0 20px rgba(245,158,11,0.15);
    }
    .btn-eye.revealed:hover { transform: none; }

    /* Eye icon SVG strikethrough line (for "revealed" state) */
    .eye-slash { display: none; }
    .btn-eye.revealed .eye-slash { display: block; }
    .btn-eye.revealed .eye-open  { display: none; }

    /* Tooltip */
    .btn-eye::after {
      content: '查看答案';
      position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.8); color: #f1f5f9;
      font-size: 11px; font-weight: 600; white-space: nowrap;
      padding: 4px 10px; border-radius: 6px; pointer-events: none;
      opacity: 0; transition: opacity 0.2s ease;
    }
    .btn-eye:hover::after { opacity: 1; }
    .btn-eye.revealed::after { content: '已查看'; }

    /* Answer banner */
    .answer-banner {
      display: none; align-items: center; gap: 10px;
      padding: 12px 16px; border-radius: 12px;
      font-size: 14px; font-weight: 500; margin-bottom: 16px;
      background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3);
      color: #fde68a; animation: bannerSlide 0.4s var(--transition);
    }
    .answer-banner.show { display: flex; }
    @keyframes bannerSlide {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .answer-banner .answer-text {
      font-family: 'Courier New', monospace; font-weight: 700; font-size: 14px;
      color: #fbbf24; background: rgba(0,0,0,0.2);
      padding: 2px 10px; border-radius: 6px; letter-spacing: 0.5px;
    }

    /* ===== Letter Tiles ===== */
    .answer-reveal { display: none; flex-wrap: wrap; gap: 5px; margin-bottom: 16px; }
    .answer-reveal.show { display: flex; }
    .letter-tile {
      width: 34px; height: 38px;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 7px; display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600; color: var(--text-primary);
      animation: tileReveal 0.4s var(--transition) both;
    }
    @keyframes tileReveal {
      from { opacity: 0; transform: scale(0.5) rotateY(90deg); }
      to   { opacity: 1; transform: scale(1) rotateY(0deg); }
    }
    .space-tile { width: 14px; height: 38px; }

    /* ===== Stats ===== */
    .stats-row {
      display: flex; gap: 10px;
      margin-top: 24px; padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .stat-item {
      flex: 1; text-align: center;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; padding: 10px 6px;
    }
    .stat-value {
      font-size: 20px; font-weight: 800;
      background: linear-gradient(135deg, #f1f5f9, var(--primary-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      line-height: 1; margin-bottom: 3px;
    }
    .stat-label { font-size: 10px; color: var(--text-secondary); font-weight: 500; text-transform: uppercase; letter-spacing: 0.6px; }

    /* ===== Completion Screen ===== */
    .completion-screen { display: none; text-align: center; padding: 20px 0; }
    .completion-screen.show { display: block; }
    .game-card.hide { display: none; }

    .trophy-icon { font-size: 68px; display: block; margin-bottom: 14px; animation: trophyBounce 0.8s var(--transition); }
    @keyframes trophyBounce {
      0%   { transform: scale(0) rotate(-15deg); }
      60%  { transform: scale(1.15) rotate(5deg); }
      80%  { transform: scale(0.95) rotate(-2deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    .completion-title {
      font-size: 28px; font-weight: 800;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 8px;
    }
    .completion-sub { color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; line-height: 1.6; }

    /* Checkin complete card */
    .checkin-complete-card {
      background: linear-gradient(135deg, rgba(16,185,129,0.15), rgba(245,158,11,0.1));
      border: 1px solid rgba(16,185,129,0.25);
      border-radius: 16px; padding: 16px 20px;
      margin-bottom: 24px; display: flex; align-items: center; gap: 14px;
      animation: fadeInScale 0.5s var(--transition);
    }
    .checkin-complete-icon { font-size: 36px; line-height: 1; }
    .checkin-complete-info { text-align: left; }
    .checkin-complete-title { font-size: 15px; font-weight: 700; color: #34d399; margin-bottom: 2px; }
    .checkin-complete-sub   { font-size: 12px; color: var(--text-secondary); }

    .final-stats { display: flex; justify-content: center; gap: 24px; margin-bottom: 28px; }
    .final-stat { text-align: center; }
    .final-stat-value { font-size: 34px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
    .final-stat-value.gold  { color: #fbbf24; }
    .final-stat-value.green { color: #10b981; }
    .final-stat-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.6px; }

    .btn-restart {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 32px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border: none; border-radius: 14px;
      font-size: 14px; font-weight: 700; color: white;
      cursor: pointer; letter-spacing: 0.3px;
      transition: all 0.3s var(--transition);
      box-shadow: 0 4px 20px rgba(124,58,237,0.4);
    }
    .btn-restart:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 8px 30px rgba(124,58,237,0.55); }

    /* ===== Confetti ===== */
    .confetti-piece {
      position: fixed; width: 10px; height: 10px; border-radius: 2px;
      pointer-events: none; z-index: 999;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    /* ===== Responsive ===== */
    @media (max-width: 600px) {
      .card { padding: 28px 20px; }
      .title { font-size: 20px; }
      .chinese-sentence { font-size: 18px; }
      .stats-row { gap: 6px; }
    }
  </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<canvas id="bgCanvas"></canvas>

<div class="app-wrapper">
  <div class="card">

        <div class="hint-text" id="hintText"></div>

      <div class="word-inputs-container" id="wordInputsContainer"></div>

      <div class="input-wrapper" id="singleInputWrapper" style="display:none;">

      </div>

      <div class="feedback" id="feedback">
        <span class="feedback-emoji" id="feedbackEmoji"></span>
        <span id="feedbackText"></span>
      </div>

      <!-- Answer Banner -->
      <div class="answer-banner" id="answerBanner">
        <span>💡 正确答案：</span>
        <span class="answer-text" id="answerBannerText"></span>
      </div>

      <div class="btn-row">
        <button class="btn-submit" id="submitBtn" onclick="handleSubmit()">✅ 确认提交</button>

        <button class="btn-eye" id="eyeBtn" onclick="showAnswer()" aria-label="查看答案">

        <div class="stat-item">

</div>

const SESSION_SIZE = 10; // 每轮随机抽取题目数

/* ============================================================
   每日打卡（localStorage）
============================================================ */
const CHECKIN_KEY = 'spelling_checkin';

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function loadCheckin() {
  try { return JSON.parse(localStorage.getItem(CHECKIN_KEY)) || { streak: 0, lastDate: '', history: [] }; }
  catch(e) { return { streak: 0, lastDate: '', history: [] }; }
}

function saveCheckin(data) {
  localStorage.setItem(CHECKIN_KEY, JSON.stringify(data));
}

function renderCheckin() {
  const data = loadCheckin();
  const today = todayStr();
  const alreadyDone = data.lastDate === today;

  const checkinTitle = document.getElementById('checkinTitle');
  const checkinSub   = document.getElementById('checkinSub');
  const checkinBtn   = document.getElementById('checkinBtn');

  checkinTitle.textContent = `🔥 连续打卡 ${data.streak} 天`;
  checkinSub.textContent   = alreadyDone
    ? `今日已打卡 ✓  下次打卡：明天`
    : `完成本轮练习后自动打卡`;

  checkinBtn.textContent = alreadyDone ? '✅ 已打卡' : '待打卡';
  checkinBtn.className   = alreadyDone ? 'checkin-btn done' : 'checkin-btn';

  // 显示最近7天点位
  const dots = document.getElementById('streakDots');
  dots.innerHTML = '';
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const dot = document.createElement('div');
    if (ds === today && alreadyDone) dot.className = 'streak-dot today';
    else if (data.history && data.history.includes(ds)) dot.className = 'streak-dot active';
    else dot.className = 'streak-dot';
    dots.appendChild(dot);
  }
}

function doCheckin() {
  // 点击横幅：仅在未完成时给提示，完成后由 showCompletion 触发
  const data = loadCheckin();
  const today = todayStr();
  if (data.lastDate === today) return; // 已打卡，无操作
  showFeedback('error', '📅', '完成本轮练习后将自动为你打卡！');
}

function performCheckin() {
  const data  = loadCheckin();
  const today = todayStr();
  if (data.lastDate === today) return data; // 幂等

  const yesterday = (() => {
    const d = new Date(); d.setDate(d.getDate() - 1);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  })();

  data.streak   = (data.lastDate === yesterday) ? data.streak + 1 : 1;
  data.lastDate = today;
  data.history  = data.history || [];
  if (!data.history.includes(today)) data.history.push(today);
  // 只保留最近 60 天记录
  data.history = data.history.slice(-60);

  saveCheckin(data);
  renderCheckin();
  return data;
}

/* ============================================================
   随机出题 + 错题权重
============================================================ */
// wrongPool: { questionIndex -> failCount }
let wrongPool = {};

function buildSessionQueue() {
  // 打乱全题库
  const indices = Array.from({ length: ALL_QUESTIONS.length }, (_, i) => i);
  shuffle(indices);

  // 先抽 SESSION_SIZE 道，错题池里的题额外权重（出现2次机会）
  const wrongIndices = Object.keys(wrongPool).map(Number)
    .filter(i => wrongPool[i] > 0)
    .sort((a, b) => wrongPool[b] - wrongPool[a]); // 错得越多越靠前

  // 从错题池里取最多 ceil(SESSION_SIZE/3) 道
  const retryCount = Math.min(wrongIndices.length, Math.ceil(SESSION_SIZE / 3));
  const retryPick  = wrongIndices.slice(0, retryCount);

  // 从非错题里随机补齐
  const freshPool = indices.filter(i => !retryPick.includes(i));
  const freshPick = freshPool.slice(0, SESSION_SIZE - retryPick.length);

  // 合并 & 打乱
  const combined = [...retryPick, ...freshPick];
  shuffle(combined);
  return combined; // indices数组
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

  currentIsRetry = (wrongPool[origIdx] > 0);

  chineseSentenceEl.textContent = q.zh;
  hintTextEl.textContent = `共 ${q.en.length} 个字符（含标点/空格）`;

  wrapper.style.display = '';

  inputIcon.className = 'input-icon';
  inputIcon.textContent = '';

  spellingInput.value = '';
  spellingInput.disabled = false;
  spellingInput.className = 'spelling-input';
  spellingInput.focus();

  // 显示单词数量提示
  const wordCount = q.en.split(' ').length;
  hintText.textContent = `💡 共 ${wordCount} 个单词`;

  answerReveal.innerHTML = '';
  answerReveal.className = 'answer-reveal';

  answerBanner.className = 'answer-banner';
  answerBannerText.textContent = '';

  eyeBtn.className = 'btn-eye';
  eyeBtn.disabled = false;
  answerVisible = false;

  submitBtn.textContent = '✅ 确认提交';
  waitingNext = false;

  // Progress
  const pct = (sessionPos / sessionQueue.length) * 100;
  progressFill.style.width = pct + '%';
  progressCount.textContent = `${sessionPos + 1} / ${sessionQueue.length}`;

  // Wrong pool badge
  const wCount = Object.values(wrongPool).filter(v => v > 0).length;
  if (wCount > 0) {
    wrongBadge.classList.remove('hidden');
    wrongQueueCount.textContent = wCount;
  } else {
    wrongBadge.classList.add('hidden');
  }
}

/* ============================================================
   提交处理
============================================================ */
function handleSubmit() {
  if (waitingNext) {
    sessionPos++;
    if (sessionPos >= sessionQueue.length) {
      showCompletion();
    } else {
      loadQuestion();
    }
    return;
  }

  const q = currentQ();
  const correct = q.en;
  const userInput = spellingInput.value.trim();
  const origIdx = sessionQueue[sessionPos];

  if (!userInput) {
    showFeedback('error', '🤔', '请先输入英文拼写！');
    return;
  }

  // 智能匹配：忽略标点、允许缩写变体
  if (isAnswerCorrect(userInput, correct)) {
    // ✅ 完全正确
    correctCount++;
    streak++;
    maxStreak = Math.max(maxStreak, streak);

    if (wrongPool[origIdx] > 0) wrongPool[origIdx]--;
    updateStats();

    spellingInput.className = 'spelling-input correct';
    inputIcon.className = 'input-icon visible success-icon';
    inputIcon.textContent = '✓';

    const streakMsg = streak >= 3 ? ` 🔥 ${streak}连对！` : '';
    showFeedback('success', '🎉', `太棒了！完全正确！${streakMsg}`);
    revealAnswer(correct);

    submitBtn.textContent = sessionPos + 1 < sessionQueue.length ? '➡️ 下一题' : '🏆 查看结果';
    waitingNext = true;

    if (streak >= 3) spawnConfetti(streak >= 5 ? 60 : 30);

  } else {
    // ❌ 错误
    wrongCount++;
    streak = 0;

    wrongPool[origIdx] = (wrongPool[origIdx] || 0) + 1;
    updateStats();

    const wCount = Object.values(wrongPool).filter(v => v > 0).length;
    wrongBadge.classList.remove('hidden');
    wrongQueueCount.textContent = wCount;

    // 计算相似度提示
    const sim = similarity(userInput.toLowerCase(), correct.toLowerCase());
    let hintMsg = sim > 0.8
      ? '🤏 只差一点点！再试一次！'
      : sim > 0.6
      ? '💪 还不错，继续努力！'
      : sim > 0.3
      ? '🤔 需要再想想哦'
      : '❌ 完全不对，看看提示吧';
    showFeedback('error', '😅', hintMsg);

    spellingInput.className = 'spelling-input wrong';
    inputIcon.className = 'input-icon visible error-icon';
    inputIcon.textContent = '✗';

    // 清空并聚焦，允许重试
    setTimeout(() => {
      spellingInput.value = '';
      spellingInput.className = 'spelling-input';
      inputIcon.className = 'input-icon';
      spellingInput.focus();
    }, 800);
  }
}

function normalise(str) { return str.replace(/\s+/g, ' ').toLowerCase().trim(); }

// 缩写扩展映射（双向）
const contractions = {
  "i'm": "i am", "you're": "you are", "he's": "he is", "she's": "she is",
  "it's": "it is", "we're": "we are", "they're": "they are",
  "i've": "i have", "you've": "you have", "we've": "we have", "they've": "they have",
  "i'll": "i will", "you'll": "you will", "he'll": "he will", "she'll": "she will",
  "we'll": "we will", "they'll": "they will",
  "i'd": "i would", "you'd": "you would", "he'd": "he would", "she'd": "she would",
  "we'd": "we would", "they'd": "they would",
  "isn't": "is not", "aren't": "are not", "wasn't": "was not", "weren't": "were not",
  "haven't": "have not", "hasn't": "has not", "hadn't": "had not",
  "don't": "do not", "doesn't": "does not", "didn't": "did not",
  "won't": "will not", "wouldn't": "would not", "can't": "cannot", "couldn't": "could not",
  "shouldn't": "should not", "mightn't": "might not", "mustn't": "must not",
  "let's": "let us", "that's": "that is", "what's": "what is", "who's": "who is",
  "there's": "there is", "here's": "here is", "there's": "there is",
  "gonna": "going to", "wanna": "want to", "gotta": "got to",
  "ima": "i am going to", "ima": "i am going to"
};

// 移除标点符号
function removePunctuation(str) {
  return str.replace(/[.,!?;:'"()\[\]{}]/g, '').trim();
}

// 扩展缩写
function expandContractions(str) {
  let result = str.toLowerCase();
  for (const [contraction, expansion] of Object.entries(contractions)) {
    // 支持带撇号的缩写：i'm -> i am
    result = result.replace(new RegExp(contraction.replace(/'/g, "'?"), 'g'), expansion);
  }
  return result;
}

// 智能判断答案是否正确
function isAnswerCorrect(userInput, correctAnswer) {
  // 1. 基本规范化：去除多余空格、转小写
  const normUser = normalise(userInput);
  const normCorrect = normalise(correctAnswer);
  
  // 2. 完全匹配（忽略大小写和空格）
  if (normUser === normCorrect) return true;
  
  // 3. 去除标点后比较
  const noPunctUser = removePunctuation(normUser);
  const noPunctCorrect = removePunctuation(normCorrect);
  if (noPunctUser === noPunctCorrect) return true;
  
  // 4. 扩展缩写后比较
  const expandUser = expandContractions(noPunctUser);
  const expandCorrect = expandContractions(noPunctCorrect);
  if (expandUser === expandCorrect) return true;
  
  return false;
}

function buildHint(userInput, correct) {
  const ui = normalise(userInput), ci = normalise(correct);
  for (let i = 0; i < Math.min(ui.length, ci.length); i++) {
    if (ui[i] !== ci[i]) return ` 提示：第 ${i + 1} 个字符有误`;
  }
  if (ui.length !== ci.length)
    return ui.length < ci.length
      ? ` 提示：内容有点短，还差 ${ci.length - ui.length} 个字符`
      : ' 提示：内容有点长';
  return '';
}

/* ============================================================
   查看答案（眼睛按钮）— 点一次显示，再点一次隐藏
============================================================ */
let answerVisible = false;

function showAnswer() {
  if (waitingNext) return;

  const correct = currentQ().en;
  const origIdx = sessionQueue[sessionPos];

  // 切换显示/隐藏
  if (answerVisible) {
    // 隐藏答案
    answerBanner.className = 'answer-banner';
    answerBannerText.textContent = '';
    answerReveal.innerHTML = '';
    answerReveal.className = 'answer-reveal';
    eyeBtn.className = 'btn-eye';
    answerVisible = false;
    return;
  }

  // 第一次显示：标记错题（只在第一次显示时计分）
  if (!eyeBtn.classList.contains('revealed')) {
    wrongCount++;
    streak = 0;
    wrongPool[origIdx] = (wrongPool[origIdx] || 0) + 1;
    updateStats();

    const wCount = Object.values(wrongPool).filter(v => v > 0).length;
    wrongBadge.classList.remove('hidden');
    wrongQueueCount.textContent = wCount;

    spellingInput.className = 'spelling-input wrong';
    inputIcon.className = 'input-icon visible error-icon';
    inputIcon.textContent = '✗';

    setTimeout(() => {
      spellingInput.className = 'spelling-input';
      inputIcon.className = 'input-icon';
      spellingInput.value = '';
      spellingInput.disabled = false;
      spellingInput.focus();
    }, 600);

    showFeedback('error', '👁️', '已揭晓答案，请跟着拼写一遍加深记忆！该题已加入错题重练队列。');
  }

  // 展示答案
  answerBannerText.textContent = correct;
  answerBanner.className = 'answer-banner show';
  revealAnswer(correct);

  // 眼睛变为"已查看"状态
  eyeBtn.className = 'btn-eye revealed';
  answerVisible = true;
}

/* ============================================================
   字母瓦片
============================================================ */
function revealAnswer(text) {
  answerReveal.innerHTML = '';
  answerReveal.className = 'answer-reveal show';
  let delay = 0;
  for (const ch of text) {
    if (ch === ' ') {
      const sp = document.createElement('div');
      sp.className = 'space-tile';
      answerReveal.appendChild(sp);
    } else {
      const tile = document.createElement('div');
      tile.className = 'letter-tile';
      tile.textContent = ch;
      tile.style.animationDelay = delay + 'ms';
      answerReveal.appendChild(tile);
      delay += 25;
    }
  }
}

/* ============================================================
   Feedback / Stats
============================================================ */
function showFeedback(type, emoji, text) {
  feedbackEmojiEl.textContent = emoji;
  feedbackTextEl.textContent  = text;
  feedbackEl.className = `feedback ${type} show`;
}

function updateStats() {
  document.getElementById('statCorrect').textContent = correctCount;
  document.getElementById('statWrong').textContent   = wrongCount;
  document.getElementById('statStreak').textContent  = streak;
}

/* ============================================================
   完成 + 自动打卡
============================================================ */
function showCompletion() {
  progressFill.style.width = '100%';
  gameCard.className = 'game-card hide';
  completionScreen.className = 'completion-screen show';

  const accuracy = Math.round((correctCount / (correctCount + wrongCount)) * 100) || 0;
  document.getElementById('finalTotal').textContent   = sessionQueue.length;
  document.getElementById('finalCorrect').textContent = correctCount;
  document.getElementById('completionSub').textContent =
    `准确率 ${accuracy}%，最长连对 ${maxStreak} 题。${accuracy >= 90 ? ' 优秀！🌟' : accuracy >= 70 ? ' 良好，继续加油！' : ' 再接再厉！💪'}`;

  // 自动打卡
  const checkinData = performCheckin();
  document.getElementById('checkinCompleteTitle').textContent = `🎉 今日打卡成功！连续 ${checkinData.streak} 天`;
  document.getElementById('checkinCompleteSub').textContent   =
    checkinData.streak >= 7 ? `坚持一周！你真的很棒 🌟` :
    checkinData.streak >= 3 ? `连续打卡 ${checkinData.streak} 天，保持势头！` :
    `明天继续加油，养成好习惯！`;

  spawnConfetti(80);
  renderCheckin();
}

/* ============================================================
   重新开始
============================================================ */
function restartGame() {
  correctCount = wrongCount = streak = maxStreak = sessionPos = 0;
  updateStats();
  sessionQueue = buildSessionQueue();
  gameCard.className = 'game-card';
  completionScreen.className = 'completion-screen';
  loadQuestion();
}

/* ============================================================
   Confetti
============================================================ */
function spawnConfetti(count) {
  const colors = ['#7c3aed','#06b6d4','#10b981','#f59e0b','#ec4899','#f1f5f9'];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `left:${Math.random()*100}vw;top:-10px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*10}px;height:${6+Math.random()*10}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*.8}s;`;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

/* Enter key disabled */

/* ============================================================
   Particle Background
============================================================ */
(function initParticles() {
  const canvas = document.getElementById('bgCanvas');
  const ctx    = canvas.getContext('2d');
  let W, H, particles = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize);
  resize();
  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random()*W; this.y = Math.random()*H;
      this.r = 0.5+Math.random()*1.5;
      this.vx = (Math.random()-.5)*.3; this.vy = (Math.random()-.5)*.3;
      this.alpha = 0.1+Math.random()*.4;
      const hues=[260,200,280,320];
      this.hue = hues[Math.floor(Math.random()*hues.length)];
    }
    update() {
      this.x+=this.vx; this.y+=this.vy;
      if(this.x<0||this.x>W||this.y<0||this.y>H) this.reset();
    }
    draw() {
      ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
      ctx.fillStyle=`hsla(${this.hue},80%,70%,${this.alpha})`; ctx.fill();
    }
  }
  for(let i=0;i<120;i++) particles.push(new Particle());
  function drawLines(){
    for(let i=0;i<particles.length;i++) for(let j=i+1;j<particles.length;j++){
      const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<100){
        ctx.beginPath(); ctx.moveTo(particles[i].x,particles[i].y); ctx.lineTo(particles[j].x,particles[j].y);
        ctx.strokeStyle=`rgba(124,58,237,${.06*(1-dist/100)})`; ctx.lineWidth=.5; ctx.stroke();
      }
    }
  }
  function animate(){
    ctx.clearRect(0,0,W,H); drawLines();
    particles.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(animate);
  }
  animate();
})();

/* ============================================================
   Boot
============================================================ */
renderCheckin();
sessionQueue = buildSessionQueue();
loadQuestion();
</script>
